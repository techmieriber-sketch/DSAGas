<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script>
      /* GitHub Pages: mapper uden trailing slash - <base> + replaceState retter relative URL'er uden ekstra page load (mindre flicker). */
      (function () {
        if (location.protocol !== "http:" && location.protocol !== "https:") return;
        var p = location.pathname;
        if (p.endsWith("/")) return;
        var last = p.slice(p.lastIndexOf("/") + 1);
        if (!last || last.indexOf(".") !== -1) return;
        var withSlash = p + "/";
        var b = document.createElement("base");
        b.href = location.origin + withSlash;
        document.head.insertBefore(b, document.head.firstChild);
        history.replaceState(null, "", withSlash + location.search + location.hash);
      })();
    </script>
    <link rel="preload" href="torvarer-bg-16x9.png" as="image" fetchpriority="high" />
    <title>Ordkort – tørvarer</title>
    <style id="critical-bg-cover">
      :root {
        --bg: #0f1115;
        --card: rgba(255, 255, 255, 0.93);
        --card2: rgba(255, 255, 255, 0.97);
        --text: #e9edf5;
        --muted: #b8c0d6;
        --ring: #7aa2ff;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        --radius: 18px;
      }
      * { box-sizing: border-box; }
      html::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-color: #0f1b24;
        background-image: url("torvarer-bg-16x9.png");
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        pointer-events: none;

      }
      
      html::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 1;
        background: linear-gradient(
          rgba(30, 144, 255, 0.08),
          rgba(30, 144, 255, 0.08)
        );
        pointer-events: none;
      }
      html {
        margin: 0;
        min-height: 100%;
        overflow-y: scroll;
        scrollbar-gutter: stable;
        background: #0f1b24;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: transparent;
        font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        color: #fff;
        position: relative;
        z-index: 2;
      }
      .page-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: 2rem;
      }
      header {
        max-width: 1100px;
        margin: 28px auto 10px;
        padding: 0 16px;
        text-align: center;
        position: relative;
      }

      .back-link {
        display: inline-block;
        margin-bottom: 8px;
        color: var(--text);
        text-decoration: underline;
        font-weight: 600;
        position: absolute;
        left: 16px;
        top: 0;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.9),
          0 0 4px rgba(0, 0, 0, 0.8),
          -1px -1px 0 rgba(0, 0, 0, 0.9),
          1px -1px 0 rgba(0, 0, 0, 0.9),
          -1px 1px 0 rgba(0, 0, 0, 0.9),
          1px 1px 0 rgba(0, 0, 0, 0.9);
      }
      h1 {
        margin: 0 0 6px;
        font-size: clamp(22px, 3vw, 30px);
        letter-spacing: 0.2px;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.9),
          0 0 4px rgba(0, 0, 0, 0.8),
          -1px -1px 0 rgba(0, 0, 0, 0.9),
          1px -1px 0 rgba(0, 0, 0, 0.9),
          -1px 1px 0 rgba(0, 0, 0, 0.9),
          1px 1px 0 rgba(0, 0, 0, 0.9);
      }
      header p {
        margin: 0 auto;
        color: rgba(255, 255, 255, 0.92);
        max-width: 70ch;
        text-align: center;
        font-weight: 600;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.9),
          0 0 4px rgba(0, 0, 0, 0.8),
          -1px -1px 0 rgba(0, 0, 0, 0.9),
          1px -1px 0 rgba(0, 0, 0, 0.9),
          -1px 1px 0 rgba(0, 0, 0, 0.9),
          1px 1px 0 rgba(0, 0, 0, 0.9);
      }
      main {
        max-width: 1100px;
        margin: 18px auto 44px;
        padding: 0 16px;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        align-items: stretch;
      }

      .card {
        perspective: 1000px;
        min-height: 320px;
      }

      .inner {
        position: relative;
        height: 100%;
        border-radius: var(--radius);
        transform-style: preserve-3d;
        transition: transform 0.5s ease;
        box-shadow: var(--shadow);
      }

      .card.is-flipped .inner {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        border-radius: var(--radius);
        overflow: hidden;
        backface-visibility: hidden;
        display: grid;
        grid-template-rows: 1fr auto;
        background: linear-gradient(180deg, var(--card) 0%, var(--card2) 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .front {
        background: linear-gradient(
          180deg,
          transparent 0%,
          transparent 78%,
          rgba(255, 255, 255, 0.93) 88%,
          rgba(255, 255, 255, 0.97) 100%
        );
      }

      .front .imgwrap {
        position: relative;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      .front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transform: scale(1.02);
      }

      .label {
        padding: 12px 12px 14px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }

      .label strong {
        font-size: 16px;
        letter-spacing: 0.2px;
        text-shadow:
          -1px -1px 0 rgba(0, 0, 0, 0.8),
          1px -1px 0 rgba(0, 0, 0, 0.8),
          -1px 1px 0 rgba(0, 0, 0, 0.8),
          1px 1px 0 rgba(0, 0, 0, 0.8),
          0 0 4px rgba(0, 0, 0, 0.9);
      }

      .hint {
        font-size: 12px;
        color: rgba(233, 237, 245, 0.65);
        white-space: nowrap;
      }

      .back {
        transform: rotateY(180deg);
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
        background: linear-gradient(180deg, #1e2d3d 0%, #15202b 100%);
      }

      .back h2 {
        margin: 0;
        font-size: 17px;
        text-align: center;
        color: var(--text);
      }

      .back .def {
        margin: 0;
        color: var(--text);
        font-size: 14px;
        text-align: left;
      }

      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        color: rgba(233, 237, 245, 0.7);
        font-size: 12px;
      }

      .tag {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
      }

      .flipBtn {
        width: 100%;
        height: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        text-align: left;
        border-radius: var(--radius);
      }

      .flipBtn:focus-visible {
        outline: 3px solid var(--ring);
        outline-offset: 3px;
      }

      @media (max-width: 520px) {
        .card { min-height: 300px; }
      }
    </style>
  </head>

  <body>
<div class="page-shell">
    <header>
      <a class="back-link" href="index.html">Tilbage</a>
      <h1>Ordkort – tørvarer</h1>
      <p>Ordet på kortet læses op, når du klikker på kortet</p>
    </header>

    <main>
      <section class="grid" id="grid" aria-label="Ordkort"></section>
    </main>
    </div>

    <script>
      const assetFolder = "./";
      const audioPlayer = new Audio();

      function getAudioFile(item) {
        if (item.img.includes("Bouillionterninger")) return "Bouillon.mp3";
        if (item.img.includes("Kidneybønner")) return "Kidneybønner.mp3?v=2";
        return item.img.replace(/\.(jpg|png)$/i, ".mp3");
      }

      const cards = [
        {
          term: "bouillonterninger",
          img: "Bouillionterninger.png",
          def: "Små, koncentrerede tern af bouillon (fx okse, høns eller grønt). De opløses i varmt vand og bruges til at give smag i supper, saucer og gryderetter.",
          tags: ["smagsgiver", "bouillon"],
        },
        {
          term: "bulgur",
          img: "Bulgur.jpg",
          def: "Knækket, forkogt hvede, som ofte bruges i salater (fx tabbouleh), som tilbehør i stedet for ris og i farsretter. Har en let nøddeagtig smag.",
          tags: ["kornprodukt", "tilbehør"],
        },
        {
          term: "havregryn",
          img: "Havregryn.jpg",
          def: "Valsede havrekerner. Bruges til grød, müsli og bagning og kan også bruges til at jævne eller give struktur i fx frikadeller.",
          tags: ["korn", "grød"],
        },
        {
          term: "hvedemel",
          img: "Hvedemel.jpg",
          def: "Fintmalet mel af hvede. Bruges især til bagning og til at jævne saucer og supper (fx i en opbagning).",
          tags: ["bagning", "jævning"],
        },
        {
          term: "kaffebønner",
          img: "Kaffebønner.jpg",
          def: "Ristede kaffebønner, som males til kaffe. Forskellig ristning og bønnetype giver forskellig smag og styrke.",
          tags: ["drik", "ristning"],
        },
        {
          term: "kakaopulver",
          img: "Kakaopulver.jpg",
          def: "Pulver af kakao, som bruges i kager, desserter og varm kakao. Findes både som usødet kakao og som kakaodrik-mix med sukker.",
          tags: ["bagning", "dessert"],
        },
        {
          term: "kidneybønner",
          img: "Kidneybønner.jpg",
          def: "Bønner med fast konsistens og mild smag. Bruges i fx chili con carne, salater og gryderetter. Tørrede bønner skal udblødes og koges grundigt.",
          tags: ["bælgfrugt", "gryderet"],
        },
        {
          term: "knækbrød",
          img: "Knækbrød.png",
          def: "Tyndt, sprødt brød, ofte bagt med kerner. Spises typisk med pålæg eller som snack og holder sig længe tørt og sprødt.",
          tags: ["brød", "sprødt"],
        },
        {
          term: "krydderier",
          img: "Krydderier.png",
          def: "Tørrede krydderurter og krydderier, som bruges til at give smag og duft i mad. Opbevares tørt og mørkt for at bevare aroma.",
          tags: ["smag", "aroma"],
        },
        {
          term: "linser",
          img: "Linser.jpg",
          def: "Små bælgfrugter (fx røde, grønne eller brune). Bruges i supper, gryderetter og salater. Røde linser koger hurtigt ud og er gode til at jævne.",
          tags: ["bælgfrugt", "protein"],
        },
        {
          term: "majsstivelse",
          img: "Majsstivelse.png",
          def: "Fin stivelse fra majs. Bruges især til jævning af saucer, supper og desserter. Røres ud i kold væske, før det kommes i varm væske.",
          tags: ["jævning", "stivelse"],
        },
        {
          term: "nødder",
          img: "Nødder.jpg",
          def: "Spiselige nødder (fx mandler, hasselnødder og cashewnødder). Bruges som snack, i bagværk, salater og som topping for smag og sprødhed.",
          tags: ["snack", "topping"],
        },
        {
          term: "pastaskruer",
          img: "Pastaskruer.jpg",
          def: "Pastaform (fusilli), der holder godt på sauce. Bruges i pastaretter og pastasalater.",
          tags: ["pasta", "tilbehør"],
        },
        {
          term: "quinoa",
          img: "Quinoa.png",
          def: "Frø, der bruges som kornprodukt. Skylles ofte før kogning. Bruges som tilbehør, i salater og i bowls. Har en let nøddeagtig smag.",
          tags: ["kornprodukt", "tilbehør"],
        },
        {
          term: "ris",
          img: "Ris.jpg",
          def: "Kornprodukt, som koges og bruges som tilbehør i mange retter. Der findes mange typer (fx basmati, jasmin, risottoris), som passer til forskellige retter.",
          tags: ["korn", "tilbehør"],
        },
        {
          term: "riskiks",
          img: "Riskiks.png",
          def: "Let, sprødt produkt af puffede ris. Spises ofte som snack eller med pålæg. Findes både naturelle og med smag.",
          tags: ["snack", "sprødt"],
        },
        {
          term: "salt",
          img: "Salt.jpg",
          def: "Grundsmag, der fremhæver andre smage. Bruges i næsten al madlavning. Findes bl.a. som fint salt, groft salt og flagesalt.",
          tags: ["krydderi", "grundsmag"],
        },
        {
          term: "sukker",
          img: "Sukker.jpg",
          def: "Små, hvide krystaller (sakkarose), som bruges til at søde og til bagning. Sukker giver også struktur og farve i bagværk.",
          tags: ["bagning", "sødemiddel"],
        },
        {
          term: "sort te",
          img: "Te.png",
          def: "Te lavet af fermenterede teblade (Camellia sinensis). Bruges til at brygge te og har typisk en kraftigere smag end grøn te.",
          tags: ["drik", "teblade"],
        },
        {
          term: "tørret frugt",
          img: "Torret-frugt.jpg",
          def: "Frugt, hvor vandet er fjernet (fx rosiner, abrikoser og tranebær). Bruges i bagning, müsli, salater og som snack.",
          tags: ["snack", "bagning"],
        },
      ];

      const grid = document.getElementById("grid");

      function capitalizeFirst(text) {
        if (!text) return "";
        return text.charAt(0).toUpperCase() + text.slice(1);
      }

      function createCard(item) {
        const titleText = capitalizeFirst(item.term);
        const defText = item.def || "";
        const audioFile = getAudioFile(item);

        const card = document.createElement("article");
        card.className = "card";

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "flipBtn";
        btn.setAttribute("aria-label", `Vend ordkort: ${titleText}`);
        btn.dataset.audio = encodeURI(assetFolder + audioFile);

        const inner = document.createElement("div");
        inner.className = "inner";

        const front = document.createElement("div");
        front.className = "face front";

        const imgwrap = document.createElement("div");
        imgwrap.className = "imgwrap";

        const img = document.createElement("img");
        img.alt = titleText;
        img.src = encodeURI(assetFolder + item.img);
        img.loading = "eager";
        imgwrap.appendChild(img);

        const label = document.createElement("div");
        label.className = "label";

        const strong = document.createElement("strong");
        strong.textContent = titleText;

        const hint = document.createElement("span");
        hint.className = "hint";
        hint.textContent = "Klik for forklaring";

        label.appendChild(strong);
        label.appendChild(hint);

        front.appendChild(imgwrap);
        front.appendChild(label);

        const back = document.createElement("div");
        back.className = "face back";

        const h2 = document.createElement("h2");
        h2.textContent = titleText;

        const def = document.createElement("p");
        def.className = "def";
        def.textContent = defText;

        const meta = document.createElement("div");
        meta.className = "meta";

        (item.tags || []).forEach((t) => {
          const tag = document.createElement("span");
          tag.className = "tag";
          tag.textContent = capitalizeFirst(t);
          meta.appendChild(tag);
        });

        back.appendChild(h2);
        back.appendChild(def);
        back.appendChild(meta);

        inner.appendChild(front);
        inner.appendChild(back);

        btn.appendChild(inner);
        card.appendChild(btn);

        const toggle = () => {
          card.classList.toggle("is-flipped");
          if (btn.dataset.audio) {
            audioPlayer.src = btn.dataset.audio;
            audioPlayer.currentTime = 0;
            audioPlayer.play().catch(() => {});
          }
        };

        btn.addEventListener("click", toggle);
        btn.addEventListener("keydown", (e) => {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();
            toggle();
          }
        });

        return card;
      }

      cards.forEach((item) => grid.appendChild(createCard(item)));
    </script>
  </body>
</html>
