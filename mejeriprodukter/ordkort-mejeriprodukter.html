<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preload" href="mejeriprodukter-bg-16x9.png" as="image" fetchpriority="high" />
    <title>Ordkort – mejeriprodukter</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: rgba(255, 255, 255, 0.93);
        --card2: rgba(255, 255, 255, 0.97);
        --text: #e9edf5;
        --muted: #b8c0d6;
        --ring: #7aa2ff;
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        --radius: 18px;
      }
      html::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-color: #0f1b24;
        background-image: url("mejeriprodukter-bg-16x9.png");
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        pointer-events: none;

      }
      html {
        margin: 0;
        min-height: 100%;
        overflow-y: scroll;
        scrollbar-gutter: stable;
        background: #0f1b24;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f1b24;
        font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        color: #fff;
        position: relative;
        z-index: 1;
      }
      .page-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: 2rem;
      }
      header {
        max-width: 1100px;
        margin: 28px auto 10px;
        padding: 0 16px;
        text-align: center;
        position: relative;
      }

      .back-link {
        display: inline-block;
        margin-bottom: 8px;
        color: var(--text);
        text-decoration: underline;
        font-weight: 600;
        position: absolute;
        left: 16px;
        top: 0;
        text-shadow:
          -1px -1px 0 rgba(0, 0, 0, 0.8),
          1px -1px 0 rgba(0, 0, 0, 0.8),
          -1px 1px 0 rgba(0, 0, 0, 0.8),
          1px 1px 0 rgba(0, 0, 0, 0.8),
          0 0 4px rgba(0, 0, 0, 0.9);
      }
      h1 {
        margin: 0 0 6px;
        font-size: clamp(22px, 3vw, 30px);
        letter-spacing: 0.2px;
      }
      p {
        margin: 0 auto;
        color: rgba(255, 255, 255, 0.92);
        max-width: 70ch;
        text-align: center;
        font-weight: 600;
        text-shadow:
          0 1px 2px rgba(0, 0, 0, 0.9),
          0 0 4px rgba(0, 0, 0, 0.8),
          -1px -1px 0 rgba(0, 0, 0, 0.9),
          1px -1px 0 rgba(0, 0, 0, 0.9),
          -1px 1px 0 rgba(0, 0, 0, 0.9),
          1px 1px 0 rgba(0, 0, 0, 0.9);
      }
      main {
        max-width: 1100px;
        margin: 18px auto 44px;
        padding: 0 16px;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        align-items: stretch;
        min-height: 50vh;
      }

      .card {
        perspective: 1000px;
        min-height: 320px;
      }

      .inner {
        position: relative;
        height: 100%;
        border-radius: var(--radius);
        transform-style: preserve-3d;
        transition: transform 0.5s ease;
        box-shadow: var(--shadow);
      }

      .card.is-flipped .inner {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        border-radius: var(--radius);
        overflow: hidden;
        backface-visibility: hidden;
        display: grid;
        grid-template-rows: 1fr auto;
        background: linear-gradient(180deg, var(--card) 0%, var(--card2) 100%);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .front {
        background: linear-gradient(
          180deg,
          transparent 0%,
          transparent 78%,
          rgba(255, 255, 255, 0.93) 88%,
          rgba(255, 255, 255, 0.97) 100%
        );
      }

      .front .imgwrap {
        position: relative;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      .front img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transform: scale(1.02);
      }

      .label {
        padding: 12px 12px 14px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: baseline;
      }

      .label strong {
        font-size: 16px;
        letter-spacing: 0.2px;
        text-shadow:
          -1px -1px 0 rgba(0, 0, 0, 0.8),
          1px -1px 0 rgba(0, 0, 0, 0.8),
          -1px 1px 0 rgba(0, 0, 0, 0.8),
          1px 1px 0 rgba(0, 0, 0, 0.8),
          0 0 4px rgba(0, 0, 0, 0.9);
      }

      .hint {
        font-size: 12px;
        color: rgba(233, 237, 245, 0.65);
        white-space: nowrap;
      }

      .back {
        transform: rotateY(180deg);
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
        background: linear-gradient(180deg, #1e2d3d 0%, #15202b 100%);
      }

      .back h2 {
        margin: 0;
        font-size: 17px;
        text-align: center;
        color: var(--text);
      }

      .back .def {
        margin: 0;
        color: var(--text);
        font-size: 14px;
        text-align: left;
      }

      .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        color: rgba(233, 237, 245, 0.7);
        font-size: 12px;
      }

      .tag {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
      }

      .flipBtn {
        width: 100%;
        height: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        text-align: left;
        border-radius: var(--radius);
      }

      .flipBtn:focus-visible {
        outline: 3px solid var(--ring);
        outline-offset: 3px;
      }

      @media (max-width: 520px) {
        .card {
          min-height: 300px;
        }
      }
    </style>
  </head>

  <body>
<div class="page-shell">
    <header>
      <a class="back-link" href="index.html">Tilbage</a>
      <h1>Ordkort – mejeriprodukter</h1>
      <p>Ordet på kortet læses op, når du klikker på kortet.</p>
    </header>

    <main>
      <section class="grid" id="grid" aria-label="Ordkort"></section>
    </main>
    </div>

    <script>
      const audioPlayer = new Audio();

      const assetFolder = "";
      const audioFolder = "";

      const cards = [
        {
          term: "A38",
          img: assetFolder + "A38.png",
          def: "Et syrnet mælkeprodukt med en cremet konsistens og en let syrlig smag. Det spises ofte til morgenmad eller som mellemmåltid.",
          tags: ["syrnet", "morgenmad"],
          imgFit: "cover"
        },
        {
          term: "creme fraiche",
          img: assetFolder + "Creme-Fraiche.png",
          audio: "Creme-fraiche.mp3",
          def: "Et tykt og cremet mejeriprodukt med en let syrlig smag. Det bruges både i kolde og varme retter.",
          tags: ["cremet", "madlavning"],
          imgFit: "cover"
        },
        {
          term: "feta",
          img: assetFolder + "Feta.png",
          def: "En fast, salt ost som ofte skæres i tern og bruges i salater eller andre kolde retter.",
          tags: ["ost", "salat"],
          imgFit: "cover"
        },
        {
          term: "flødeis",
          img: assetFolder + "Flødeis.png",
          audio: "Flødeis.mp3",
          def: "En sød, frossen dessert lavet med fløde eller mælk. Den serveres ofte i kugler.",
          tags: ["dessert", "frossen"],
          imgFit: "cover"
        },
        {
          term: "flødeost",
          img: assetFolder + "Flødeost.png",
          def: "En blød og smørbar ost med mild smag. Den bruges ofte på brød og i kolde retter.",
          tags: ["ost", "smørbar"],
          imgFit: "cover"
        },
        {
          term: "hytteost",
          img: assetFolder + "Hytteost.png",
          def: "En frisk ost med små bløde klumper og mild smag. Den spises ofte på brød eller i salater.",
          tags: ["frisk ost", "protein"],
          imgFit: "cover"
        },
        {
          term: "kærnemælk",
          img: assetFolder + "Kærnemælk.png",
          def: "En tynd, syrnet mælk med frisk og let syrlig smag. Den drikkes kold og bruges også i bagning.",
          tags: ["syrnet", "drik"],
          imgFit: "cover"
        },
        {
          term: "letmælk",
          img: assetFolder + "Letmælk.png",
          def: "Mælk med lavere fedtindhold end sødmælk. Den bruges både som drik og i madlavning.",
          tags: ["mælk", "drik"],
          imgFit: "cover"
        },
        {
          term: "minimælk",
          img: assetFolder + "Minimælk.png",
          def: "Mælk med et meget lavt fedtindhold. Den bruges som drik og i madlavning.",
          tags: ["mælk", "drik"],
          imgFit: "cover"
        },
        {
          term: "mozzarella",
          img: assetFolder + "Mozzarella.png",
          def: "En blød og mild ost, som ofte bruges i salater, på pizza og i andre retter.",
          tags: ["ost", "mild"],
          imgFit: "cover"
        },
        {
          term: "ost",
          img: assetFolder + "Ost.png",
          def: "Et mejeriprodukt lavet af mælk. Ost findes i mange forskellige typer, smage og konsistenser.",
          tags: ["ost", "mejeri"],
          imgFit: "cover"
        },
        {
          term: "parmesan",
          img: assetFolder + "Parmesan.png",
          def: "En hård ost med kraftig smag, som ofte rives eller brækkes i mindre stykker.",
          tags: ["ost", "hård ost"],
          imgFit: "cover"
        },
        {
          term: "piskefløde",
          img: assetFolder + "Piskefløde.png",
          def: "Fløde med højt fedtindhold, som kan piskes til skum og bruges i desserter og madlavning.",
          tags: ["fløde", "dessert"],
          imgFit: "cover"
        },
        {
          term: "skummetmælk",
          img: assetFolder + "Skummetmælk.png",
          def: "Mælk med næsten intet fedt. Den bruges som drik og i forskellige retter.",
          tags: ["mælk", "fedtfattig"],
          imgFit: "cover"
        },
        {
          term: "skyr",
          img: assetFolder + "Skyr.png",
          def: "Et tykt mejeriprodukt med mild syrlig smag og et højt indhold af protein. Det spises ofte til morgenmad eller som mellemmåltid.",
          tags: ["morgenmad", "protein"],
          imgFit: "cover"
        },
        {
          term: "smør",
          img: assetFolder + "Smør.png",
          def: "Et fedtholdigt mejeriprodukt, som bruges på brød og i madlavning eller bagning.",
          tags: ["fedstof", "brød"],
          imgFit: "cover"
        },
        {
          term: "sødmælk",
          img: assetFolder + "Sødmælk.png",
          def: "Mælk med et højere fedtindhold end letmælk, minimælk og skummetmælk.",
          tags: ["mælk", "drik"],
          imgFit: "cover"
        },
        {
          term: "tykmælk",
          img: assetFolder + "Tykmælk.png",
          audio: "tykmælk.mp3",
          def: "Et syrnet mejeriprodukt med en cremet og let tyk konsistens. Det spises ofte koldt.",
          tags: ["syrnet", "morgenmad"],
          imgFit: "cover"
        },
        {
          term: "ymer",
          img: assetFolder + "Ymer.png",
          def: "Et syrnet mejeriprodukt, som minder om yoghurt, men ofte har en lidt fyldigere konsistens og mere syrlig smag.",
          tags: ["syrnet", "morgenmad"],
          imgFit: "cover"
        },
        {
          term: "yoghurt",
          img: assetFolder + "Yoghurt.png",
          def: "Et syrnet mejeriprodukt med blød og cremet konsistens. Det spises ofte til morgenmad eller som mellemmåltid.",
          tags: ["syrnet", "cremet"],
          imgFit: "cover"
        }
      ];

      const deriveTermFromImg = (imgPath) => {
        if (!imgPath) return "ukendt";
        const file = (imgPath.split("/").pop() || "").trim();
        const base = file.replace(/\.[^.]+$/, "");
        const withoutLeadingNumbers = base.replace(/^[\d]+[\s._-]*/g, "");
        const spaced = withoutLeadingNumbers.replace(/[_-]+/g, " ");
        const cleaned = spaced.replace(/\s+/g, " ").trim().toLowerCase();
        return cleaned || "ukendt";
      };

      const getSafeTerm = (c) => {
        const t = (c.term ?? "").toString().trim();
        return t.length ? t : deriveTermFromImg(c.img);
      };

      const grid = document.getElementById("grid");

      function capitalizeFirst(text) {
        if (!text) return "";
        return text.charAt(0).toUpperCase() + text.slice(1);
      }

      function createCard(item) {
        const safeTerm = getSafeTerm(item);
        const titleText = capitalizeFirst(safeTerm);
        const defText = capitalizeFirst(item.def || "");

        const imgBase = (item.img || "").split("/").pop().replace(/\.[^.]+$/, "") || safeTerm;
        const audioFile = item.audio || `${imgBase}.mp3`;

        const card = document.createElement("article");
        card.className = "card";

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "flipBtn";
        btn.setAttribute("aria-label", `Vend ordkort: ${titleText}`);
        btn.dataset.audio = encodeURI(`${audioFolder}${audioFile}`);

        const inner = document.createElement("div");
        inner.className = "inner";

        const front = document.createElement("div");
        front.className = "face front";

        const imgwrap = document.createElement("div");
        imgwrap.className = "imgwrap";

        const img = document.createElement("img");
        img.alt = titleText;
        img.src = item.img;
        img.loading = "eager";

        if (item.imgFit) img.style.objectFit = item.imgFit;
        if (item.imgPosition) img.style.objectPosition = item.imgPosition;

        imgwrap.appendChild(img);

        const label = document.createElement("div");
        label.className = "label";

        const strong = document.createElement("strong");
        strong.textContent = titleText;

        const hint = document.createElement("span");
        hint.className = "hint";
        hint.textContent = "Klik for forklaring";

        label.appendChild(strong);
        label.appendChild(hint);

        front.appendChild(imgwrap);
        front.appendChild(label);

        const back = document.createElement("div");
        back.className = "face back";

        const h2 = document.createElement("h2");
        h2.textContent = titleText;

        const def = document.createElement("p");
        def.className = "def";
        def.textContent = defText;

        const meta = document.createElement("div");
        meta.className = "meta";

        (item.tags || []).forEach((t) => {
          const tag = document.createElement("span");
          tag.className = "tag";
          tag.textContent = capitalizeFirst(t);
          meta.appendChild(tag);
        });

        back.appendChild(h2);
        back.appendChild(def);
        back.appendChild(meta);

        inner.appendChild(front);
        inner.appendChild(back);

        btn.appendChild(inner);
        card.appendChild(btn);

        btn.addEventListener("click", () => {
          card.classList.toggle("is-flipped");
          if (btn.dataset.audio) {
            audioPlayer.src = btn.dataset.audio;
            audioPlayer.currentTime = 0;
            audioPlayer.play().catch(() => {});
          }
        });

        btn.addEventListener("keydown", (e) => {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();
            card.classList.toggle("is-flipped");
            if (btn.dataset.audio) {
              audioPlayer.src = btn.dataset.audio;
              audioPlayer.currentTime = 0;
              audioPlayer.play().catch(() => {});
            }
          }
        });

        return card;
      }

      cards.forEach((item) => grid.appendChild(createCard(item)));
    </script>
  </body>
</html>
